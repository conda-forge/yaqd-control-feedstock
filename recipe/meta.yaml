{% set name = "yaqd-control" %}
{% set version = "2026.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('_', '-') }}-{{ version }}.tar.gz
  sha256: 4ba1e56c81d3379859ca69eab64b97368183071d40d544ceaf46652fe8cc8a7a

build:
  noarch: python
  number: 0
  entry_points:
    - yaqd=yaqd_control.__main__:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - appdirs
    - click
    - yaqc
    - prettytable !=1.0.0
    - python {{ python_min }}
    - rich
    - toml
    - pip
    - flit
  run:
    - appdirs
    - click
    - yaqc
    - prettytable !=1.0.0
    - python >={{ python_min }}
    - rich
    - toml

test:
  requires:
    - python {{ python_min }}
  imports:
    - yaqd_control
  commands:
    - yaqd --help

about:
  home: https://yaq.fyi
  license: LGPL-3.0-only
  license_family: LGPL
  license_file: LICENSE
  summary: Command line tools for inspecting and controlling yaq daemons.
  doc_url: https://yaq.fyi
  dev_url: https://gitlab.com/yaq/yaqd-control

extra:
  recipe-maintainers:
    - untzag
    - ksunden
    - ddkohler
